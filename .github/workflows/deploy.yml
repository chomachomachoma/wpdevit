name: Deploy theme to production

# Builds the Svelte SPA and deploys the compiled theme into the live WordPress
# install. Runs on a SELF-HOSTED runner on the DigitalOcean droplet itself, so
# deployment is a local file copy — no inbound SSH (the droplet's cloud
# firewall blocks SSH from GitHub-hosted runners).
#
# Triggers: pushes to main that touch theme source, or manual "Run workflow".
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'inc/**'
      - 'functions.php'
      - 'index.php'
      - 'style.css'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'svelte.config.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Never let two deploys overlap; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  THEME_PATH: /var/www/wpdevit.com/wp-content/themes/wpdevit

jobs:
  deploy:
    runs-on: [self-hosted, droplet]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build theme
        run: npm run build

      - name: Stage runtime files
        # Only the files WordPress serves at runtime; dev sources are excluded.
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r functions.php index.php style.css inc dist deploy/

      - name: Deploy to live theme dir
        # Local rsync --delete keeps the theme dir an exact mirror of deploy/.
        run: |
          rsync -a --delete deploy/ "$THEME_PATH/"
          chown -R www-data:www-data "$THEME_PATH"

      - name: Smoke test
        # Hit the local Apache vhost directly (keeps correct SNI/Host).
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve wpdevit.com:443:127.0.0.1 https://wpdevit.com/)
          echo "Homepage returned HTTP $code"
          test "$code" = "200"
          curl -sf --resolve wpdevit.com:443:127.0.0.1 \
            https://wpdevit.com/wp-json/wpdevit/v1/site-info > /dev/null
          echo "REST site-info reachable. Deploy OK."
